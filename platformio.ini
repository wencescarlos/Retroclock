; ╔═══════════════════════════════════════════════════════╗
; ║          RELOJ RETRO - PlatformIO Config              ║
; ║  Placa: ESP32-2432S028Rv3 (Cheap Yellow Display)      ║
; ╚═══════════════════════════════════════════════════════╝
[env:CYD_RetroClock]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    arduino-libraries/NTPClient @ ^3.2.1
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    tzapu/WiFiManager @ ^2.0.17

; ─── Configuración extraida del board JSON oficial ───
; https://github.com/rzeldent/platformio-espressif32-sunton (esp32-2432S028Rv3.json)
;
; Display: ST7789  (SPI2_HOST, 24 MHz, SPI_MODE3)
;   MOSI=13  SCLK=14  CS=15  DC=2  RST=NC  MISO=NC  BL=21
build_flags =
    -DUSER_SETUP_LOADED=1

    ; Driver del display
    -DST7789_DRIVER=1

    ; Resolución nativa (portrait). setRotation(1) da landscape 320x240.
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320

    ; Pines SPI (MISO es NC en esta placa — no usar GPIO12 que es strapping pin)
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_MISO=-1

    ; SPI_MODE3 segun el board spec (ST7789_SPI_CONFIG_SPI_MODE=SPI_MODE3)
    -DTFT_SPI_MODE=3

    ; Velocidad SPI: 40 MHz (el board spec indica 24 MHz pero el ST7789
    ; aguanta 40 MHz en la mayoria de placas CYD; si aparecen artefactos
    ; visuales bajar a 27000000)
    -DSPI_FREQUENCY=40000000

    ; Fuentes
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
